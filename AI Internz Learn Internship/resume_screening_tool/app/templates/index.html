<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Screening Tool</title>
</head>
<body>
    <h1>Resume Screening Tool</h1>
    <form method="POST" enctype="multipart/form-data">
        <label for="resume">Upload Resume (PDF):</label>
        <input type="file" id="resume" name="resume" accept=".pdf" required>
        <br><br>
        <label for="job_desc">Upload Job Description (TXT):</label>
        <input type="file" id="job_desc" name="job_desc" accept=".txt" required>
        <br><br>
        <button type="submit">Submit</button>
    </form>
    {% if similarity %}
        <h2>Similarity Score: {{ similarity }}%</h2>
    {% endif %}
</body>
</html>
